<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Normie Canvas Lab</title>
    <meta
      property="og:image"
      content="https://api.normies.art/normie/9098/image.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://api.normies.art/normie/9098/image.png"
    />
    <link rel="preconnect" href="https://api.normies.art" />
  </head>
  <body>
    <noscript>Enable JavaScript to use Normie Canvas Lab.</noscript>
    <!-- If JS works, React replaces #root. If this never clears, the host may be serving unbuilt HTML or missing JS bundles — Cloudflare "Build output" must be dist after npm run build. -->
    <div id="root">
      <p style="margin: 0; padding: 1.25rem; font-family: system-ui, sans-serif; color: #444; max-width: 40rem">
        Loading Normie Canvas Lab…
        <span style="display: block; font-size: 0.85rem; margin-top: 0.5rem; color: #888"
          >If this never disappears, open DevTools → Network and check that
          <code>/assets/*.js</code> returns 200 (deploy must publish the
          <code>dist</code> folder after <code>npm run build</code>).</span
        >
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
